<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Kavi Kattam Boutique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-page dashboard-page">
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-brand">
        <span>🌸</span>
        <div>
          <strong>Kavi Kattam</strong>
          <span>Admin Dashboard</span>
        </div>
      </div>
      <div class="admin-actions">
        <a href="/" class="btn btn-outline btn-sm" target="_blank">View Site</a>
        <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="admin-main container-wide">
    <div class="dashboard-grid">
      <section class="panel">
        <h2 id="form-title">Add New Product</h2>
        <form id="product-form" enctype="multipart/form-data">
          <input type="hidden" id="product-id" value="">

          <div class="form-group">
            <label for="name">Product Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Silk Saree Collection">
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="e.g. Sarees, Dresses, Accessories">
          </div>

          <div class="form-group">
            <label for="price">Price (LKR)</label>
            <input type="number" id="price" name="price" min="0" step="0.01" placeholder="e.g. 8500">
          </div>

          <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" rows="5" required placeholder="Describe the product — fabric, size, colors, etc."></textarea>
          </div>

          <div class="form-group">
            <label for="image">Product Image *</label>
            <input type="file" id="image" name="image" accept="image/*">
            <p class="form-hint">JPG, PNG or WebP. Max 5MB.</p>
            <div id="image-preview" class="image-preview" hidden>
              <img id="preview-img" alt="Preview">
            </div>
          </div>

          <p id="form-error" class="form-error" hidden></p>
          <p id="form-success" class="form-success" hidden></p>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">Save Product</button>
            <button type="button" class="btn btn-outline" id="cancel-btn" hidden>Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Your Products</h2>
          <span id="product-count" class="badge">0 items</span>
        </div>
        <div id="products-list" class="products-admin-list">
          <p class="empty-state">No products yet. Add your first product using the form.</p>
        </div>
      </section>
    </div>
  </main>

  <script src="/admin/dashboard.js"></script>
</body>
</html>
