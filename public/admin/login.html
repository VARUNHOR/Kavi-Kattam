<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Kavi Kattam Boutique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-page">
  <div class="login-card">
    <div class="login-header">
      <img src="/logo.jpeg" alt="Kavi Kattam logo" class="logo-image">
      <h1>Kavi Kattam</h1>
      <p>Admin Login</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <p id="login-error" class="form-error" hidden></p>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <a href="/" class="back-link">← Back to website</a>
  </div>

  <script src="/admin/login.js"></script>
</body>
</html>
